<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <g>
    <!-- Mark: circular emblem with stylized figure -->
    <g transform="translate(8,8)">
      <!-- Outer circle ring -->
      <circle cx="32" cy="32" r="30" stroke="#1B4C56" stroke-width="3" fill="none"/>
      <!-- Top arc accent -->
      <path d="M 8 28 Q 32 4 56 28" stroke="#2BAFA0" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Bottom arc accent -->
      <path d="M 8 36 Q 32 60 56 36" stroke="#2BAFA0" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Stylized person: head -->
      <circle cx="32" cy="22" r="5" fill="#1B4C56"/>
      <!-- Body and arm gesture (check mark-like) -->
      <path d="M 22 36 L 30 46 L 44 28" stroke="#1B4C56" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Dotted curve bottom -->
      <path d="M 12 50 Q 32 64 52 50" stroke="#2BAFA0" stroke-width="2" fill="none" stroke-dasharray="2 4" stroke-linecap="round"/>
    </g>
    <!-- Wordmark -->
    <text x="80" y="38" font-family="serif" font-size="28" font-weight="700" fill="#1B4C56">Servipersonal</text>
    <text x="80" y="58" font-family="sans-serif" font-size="11" font-weight="500" fill="#1B4C56" letter-spacing="0.5">de Colombia S.A.S.</text>
  </g>
</svg>